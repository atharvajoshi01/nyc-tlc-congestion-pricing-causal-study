name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests (uses committed panels, no raw download)
        run: pytest -q
      - name: Re-run analysis end-to-end from committed panels
        run: |
          python src/did.py
          python src/robustness.py
